<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dados — Labs farpa.ai</title>
  <link rel="stylesheet" href="tokens.css">
  <link rel="stylesheet" href="themes.css">
  <link rel="stylesheet" href="components.css">
  <script src="theme-engine.js"></script>
</head>
<body class="theme-claro">
  <header>
    <a href="/">← Labs</a>
    <button id="btn-alto-contraste">Alto contraste</button>
  </header>
  <main>
    <h1>Dados — Labs</h1>
    <p>Última atualização: <span id="timestamp">—</span></p>
    <button id="btn-atualizar">Atualizar</button>
    <div id="dados">Carregando...</div>
  </main>
  <script>
    const WORKER_URL = 'https://labs-worker.rfelipefernandes.workers.dev';

    document.getElementById('btn-alto-contraste').addEventListener('click', () => {
      document.body.classList.toggle('theme-alto-contraste');
      localStorage.setItem('farpa-tema', document.body.className);
    });
    const temaSalvo = localStorage.getItem('farpa-tema');
    if (temaSalvo) document.body.className = temaSalvo;

    async function buscarDados() {
      document.getElementById('dados').textContent = 'Carregando...';
      try {
        const res = await fetch(`${WORKER_URL}/db/items`);
        const data = await res.json();
        document.getElementById('dados').textContent = JSON.stringify(data, null, 2);
        document.getElementById('timestamp').textContent = new Date().toLocaleString('pt-BR');
      } catch (e) {
        document.getElementById('dados').textContent = 'Erro ao buscar dados.';
      }
    }

    document.getElementById('btn-atualizar').addEventListener('click', buscarDados);
    buscarDados();
    // auto-refresh 60s
    setInterval(buscarDados, 60000);
  </script>
</body>
</html>
